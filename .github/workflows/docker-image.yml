name: Docker Image

# deploy-guideline §1 태깅 정책의 실행 주체 — develop push → :develop 태그 / 릴리스 태그
# push → :vX.Y.Z + :latest + :main 태그. compose 2파일이 이 태그를 소비한다.
# develop→main 자동 PR 생성(구 promote 잡)은 GitFlow 스킬(release.md)로 이관됐다 —
# 이 워크플로는 순수 이미지 빌드·검증·배포만 담당한다.

on:
  push:
    branches: [develop]
    tags: ["v*"]

env:
  IMAGE: ghcr.io/tylorstyle/chunchugwan   # GHCR 은 소문자만 허용

# 같은 ref 에 연속 push 시 멀티아치 빌드가 겹치지 않게 한다.
# develop 는 최신만 의미가 있어 진행 중 빌드를 취소하지만, 태그(릴리스)는
# 보존해 릴리스 이미지가 중간에 끊기지 않게 한다.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/develop' }}

jobs:
  # 플랫폼별 네이티브 빌드 (QEMU 에뮬레이션 없이 — chromium 설치가 느려서).
  # GitHub 호스티드 러너를 아키텍처별로 — amd64→ubuntu-latest·arm64→ubuntu-24.04-arm
  # (공개 리포라 arm64 호스티드 러너도 무료).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 플랫폼 슬러그 (아티팩트·캐시 키용)
        run: echo "PLATFORM_SLUG=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: GHCR 로그인
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 후 digest 로 푸시
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # 디버그 진단 서버는 develop 빌드에만 포함한다(Dockerfile ARG INCLUDE_DEBUG).
          # main·릴리스 태그 빌드는 빈값 → debug_server.py 가 이미지에서 제거된다.
          build-args: |
            INCLUDE_DEBUG=${{ github.ref == 'refs/heads/develop' && '1' || '' }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,scope=${{ env.PLATFORM_SLUG }},mode=max

      - name: digest 기록
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ env.PLATFORM_SLUG }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # 플랫폼별 digest 를 하나의 멀티아치 매니페스트로 합쳐 "임시" 태그로만 push한다.
  # 스모크 통과 전까지 develop/latest/main/semver 등 가변 태그는 공개하지 않는다
  # (표준 §8.6 "develop 태그 승격 스모크 게이트" — compose 소비자를 깨진 이미지로부터 보호).
  merge-staging:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      actions: read   # download-artifact 가 아티팩트 API 호출에 쓰는 스코프(예방적 명시)
    timeout-minutes: 10
    outputs:
      staging-tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: GHCR 로그인
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tag
        run: echo "value=staging-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: 스테이징 태그로 매니페스트 push
        working-directory: /tmp/digests
        run: |
          # shellcheck disable=SC2046  # 의도된 word splitting — digest 목록을 -t 인자로 전개
          docker buildx imagetools create \
            -t "$IMAGE:${{ steps.tag.outputs.value }}" \
            $(printf "$IMAGE@sha256:%s " *)

  # 방금 push한 스테이징 태그를 실제로 돌려 기동을 확인한다. develop push·릴리스 태그
  # push 양쪽 모두 게이트를 태운다(표준은 develop 만 요구하지만 :latest·:vX.Y.Z 로도
  # 깨진 이미지가 올라가지 않도록 확장).
  smoke:
    runs-on: ubuntu-latest
    needs: merge-staging
    permissions:
      packages: read
    timeout-minutes: 10

    steps:
      - name: GHCR 로그인
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 태그 결정
        run: echo "TAG=$IMAGE:${{ needs.merge-staging.outputs.staging-tag }}" >> "$GITHUB_ENV"

      - name: CLI 스모크 (--version)
        run: docker run --rm "$TAG" --version

      - name: 대시보드 기동 스모크
        run: |
          # 0.0.0.0 바인딩 → 인증 강제, 관리자 자동 등록으로 부팅만 검증한다.
          # 포트 발행·호스트 curl 없이 `docker exec` 로 컨테이너 '내부'에서 8765 LISTEN 을
          # 확인한다(uvicorn 은 "Application startup complete" 후에만 바인딩하므로
          # connect 성공 = 기동 완료). 컨테이너만으로 검증하므로 러너 종류에 무관하게 동작.
          # 이전 run 의 잔존 컨테이너는 선제 제거.
          docker rm -f wccg-smoke >/dev/null 2>&1 || true
          docker run -d --name wccg-smoke \
            -e WCCG_HOST=0.0.0.0 \
            -e WCCG_ADMIN_EMAIL=smoke@example.com \
            -e WCCG_ADMIN_PASSWORD=smoke-password-1234 \
            "$TAG" serve
          ok=0
          for i in $(seq 1 30); do
            # if 조건이라 connect 실패(비정상 종료)가 set -e 에 안 걸린다 — 그냥 재시도.
            if docker exec wccg-smoke python -c "import socket; socket.create_connection(('127.0.0.1', 8765), 5).close()" 2>/dev/null; then
              echo "try $i -> OK (대시보드가 8765 에서 응답)"; ok=1; break
            fi
            echo "try $i -> 대기"
            sleep 2
          done
          echo "--- 컨테이너 로그 ---"; docker logs wccg-smoke || true
          docker rm -f wccg-smoke >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "::error::대시보드가 기동 응답하지 않음"; exit 1; }

  # 스모크 통과 후에만 가변 태그(develop/latest/main/semver)를 공개한다 — 이미 검증된
  # 스테이징 digest 를 소스로 재태깅(재빌드 없음, 플랫폼별 레이어는 바이트 그대로 재사용).
  publish-tags:
    runs-on: ubuntu-latest
    needs: [merge-staging, smoke]
    permissions:
      packages: write
    timeout-minutes: 10

    steps:
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: GHCR 로그인
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 태그 결정
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: 최종 태그 push (스테이징 digest 재태깅)
        run: |
          # shellcheck disable=SC2046  # 의도된 word splitting — -t 태그 인자 목록으로 전개
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "$IMAGE:${{ needs.merge-staging.outputs.staging-tag }}"

      - name: 결과 확인
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"
