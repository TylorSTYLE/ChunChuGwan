name: Docker

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/tylorstyle/chunchugwan   # GHCR 은 소문자만 허용

# 같은 ref 에 연속 push 시 멀티아치 빌드가 겹치지 않게 한다.
# develop 는 최신만 의미가 있어 진행 중 빌드를 취소하지만, main·태그(릴리스)는
# 보존해 릴리스 이미지가 중간에 끊기지 않게 한다.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/develop' }}

jobs:
  # 플랫폼별 네이티브 빌드 (QEMU 에뮬레이션 없이 — chromium 설치가 느려서).
  # 셀프 호스트 러너를 아키텍처별로 1대씩 둬서 amd64→X64·arm64→ARM64 로 보낸다.
  build:
    # 릴리스(release.yml)는 main 범프 커밋·develop FF 를 따로 push 하는데, 같은 트리를
    # 가리키는 vX.Y.Z 태그 빌드가 :latest·:main·:develop 태그까지 모두 떠맡으므로
    # (아래 meta 참조) 범프 커밋에 의한 브랜치 push 빌드는 중복이라 건너뛴다.
    if: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') && startsWith(github.event.head_commit.message, '춘추관 v')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: [self-hosted, X64]
          - platform: linux/arm64
            runner: [self-hosted, ARM64]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: 플랫폼 슬러그 (아티팩트·캐시 키용)
        run: echo "PLATFORM_SLUG=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v4

      - name: GHCR 로그인
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 후 digest 로 푸시
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,scope=${{ env.PLATFORM_SLUG }},mode=max

      - name: digest 기록
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_SLUG }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # 플랫폼별 digest 를 하나의 멀티아치 매니페스트로 합쳐 태그 푸시
  merge:
    runs-on: self-hosted
    needs: build
    permissions:
      packages: write
    timeout-minutes: 10

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - name: 태그 결정
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            # 릴리스 태그 빌드가 브랜치 push 빌드를 대신하므로 :latest·:main·:develop 도 함께 찍는다
            # (태그 커밋 = main HEAD = FF 된 develop 와 동일 트리).
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=develop,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: GHCR 로그인
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 매니페스트 생성·푸시
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

      - name: 결과 확인
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"

  # 방금 푸시한 브랜치 이미지를 실제로 돌려 기동을 확인 (develop·main 푸시만)
  smoke:
    runs-on: self-hosted
    needs: merge
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    permissions:
      packages: read
    timeout-minutes: 10

    steps:
      - name: GHCR 로그인
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 태그 결정
        run: echo "TAG=$IMAGE:${{ github.ref_name }}" >> "$GITHUB_ENV"

      - name: CLI 스모크 (--version)
        run: docker run --rm "$TAG" --version

      - name: 대시보드 기동 스모크
        run: |
          # 0.0.0.0 바인딩 → 인증 강제, 관리자 자동 등록으로 부팅만 검증한다
          docker run -d --name wccg-smoke \
            -e WCCG_HOST=0.0.0.0 \
            -e WCCG_ADMIN_EMAIL=smoke@example.com \
            -e WCCG_ADMIN_PASSWORD=smoke-password-1234 \
            -p 8765:8765 "$TAG" serve
          ok=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8765/ || echo 000)
            echo "try $i -> $code"
            if [ "$code" != "000" ] && [ "$code" -lt 500 ]; then
              echo "대시보드 응답 OK ($code)"; ok=1; break
            fi
            sleep 2
          done
          echo "--- 컨테이너 로그 ---"; docker logs wccg-smoke || true
          docker rm -f wccg-smoke >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "::error::대시보드가 기동 응답하지 않음"; exit 1; }

  # 스모크 통과한 develop 을 main 으로 올릴 릴리스 PR 을 만들고
  # 변경 diff 로 release:* 라벨을 자동 부여 (사람이 검토 후 머지)
  promote:
    runs-on: self-hosted
    needs: smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: bump 레벨 판정
        id: bump
        run: |
          git fetch origin main develop --quiet
          range="origin/main...origin/develop"
          files=$(git diff --name-only $range)
          if [ -z "$files" ]; then
            echo "develop 가 main 과 동일 — 승격할 변경 없음"
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 1) 커밋 메시지에 호환 깨짐 신호가 있으면 major
          if git log --format='%B' $range | grep -iE 'BREAKING|호환[[:space:]]*깨' >/dev/null; then
            level=major
          # 2) 코드(docs/tests/.md/.github 외)가 바뀌었으면 minor, 아니면 patch
          #    grep -q 는 BSD/GNU 동작 차이가 있어 출력 캡처로 판정
          elif [ -n "$(echo "$files" | grep -vE '^(docs/|tests/|\.github/)|\.md$' || true)" ]; then
            level=minor
          else
            level=patch
          fi
          echo "변경 파일:"; echo "$files"
          echo "판정 레벨: release:$level"
          echo "level=$level" >> "$GITHUB_OUTPUT"

      - name: develop→main 릴리스 PR 생성·갱신 + 라벨
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          LEVEL: ${{ steps.bump.outputs.level }}
        run: |
          num=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          if [ -z "$num" ]; then
            body=$(printf '%s\n' \
              '도커 `:develop` 이미지 빌드·스모크 통과 후 자동 생성된 릴리스 PR.' \
              '' \
              '머지하면 `release.yml` 이 `release:*` 라벨로 다음 버전을 결정해 태그·Release 를 등록한다.' \
              '판정 레벨이 맞지 않으면 라벨을 직접 바꾼 뒤 머지할 것 (호환 깨짐=major / 기능=minor / 버그·문서·리팩터=patch).')
            gh pr create --base main --head develop \
              --title "릴리스: develop → main" \
              --body "$body"
            num=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          fi
          # 기존 release:* 라벨 정리 후 판정 라벨만 부여
          for l in release:major release:minor release:patch; do
            [ "$l" = "release:$LEVEL" ] || gh pr edit "$num" --remove-label "$l" 2>/dev/null || true
          done
          gh pr edit "$num" --add-label "release:$LEVEL"
          echo "PR #$num → release:$LEVEL"
