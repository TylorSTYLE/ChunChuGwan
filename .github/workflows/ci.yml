name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI 는 읽기만 필요하다 — PR(신뢰 불가 코드)이 쓰기 토큰과 함께 돌지 않게 최소권한 고정.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci
        working-directory: frontend

      - name: 타입체크 (svelte-check)
        run: npm run check
        working-directory: frontend

      - name: 빌드
        run: npm run build
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: uv 설치
        uses: astral-sh/setup-uv@v6
        with:
          # 호스티드 러너는 런마다 새 VM 이라 로컬 uv 캐시가 보존되지 않는다.
          # GHA 캐시를 켜 의존성 다운로드를 런 간 재사용한다.
          enable-cache: true
          python-version: "3.14"

      - name: 의존성 설치
        run: uv sync --locked

      - name: Node 설치 (대시보드 SPA 빌드용)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 대시보드 SPA 빌드
        # C2 컷오버로 FastAPI 가 SPA 정적 산출물을 루트(/)로 서빙한다 — 통합 테스트가
        # SPA 셸 라우트(예: GET /·/login)를 200 으로 받으려면 frontend/build 가 필요하다.
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Playwright 브라우저 캐시
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          # uv.lock 의 무관한 패키지 변경으로 키가 빗나가도 직전 캐시에서 복원해
          # chromium 통째 재다운로드를 피한다 (버전이 같으면 install 이 즉시 끝남).
          restore-keys: playwright-${{ runner.os }}-

      - name: Chromium 설치
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install --with-deps chromium

      - name: Chromium 시스템 의존성 설치 (캐시 히트 시)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: uv run playwright install-deps chromium

      - name: 테스트
        run: uv run pytest -v
