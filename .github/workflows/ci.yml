name: CI

on:
  push:
    branches: [main]
    # 문서/마크다운만 바뀐 커밋은 Python·Playwright·SPA 빌드를 돌릴 이유가 없다.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"

# CI 는 읽기만 필요하다 — PR(신뢰 불가 코드)이 쓰기 토큰과 함께 돌지 않게 최소권한 고정.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    # draft PR 동안은 무거운 잡을 돌리지 않는다 (push 는 항상 실행).
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Node 설치
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci
        working-directory: frontend

      - name: 타입체크 (svelte-check)
        run: npm run check
        working-directory: frontend

      - name: 빌드
        run: npm run build
        working-directory: frontend

  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: uv 설치
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          # 호스티드 러너는 런마다 새 VM 이라 로컬 uv 캐시가 보존되지 않는다.
          # GHA 캐시를 켜 의존성 다운로드를 런 간 재사용한다.
          enable-cache: true
          python-version: "3.14"

      - name: 의존성 설치
        run: uv sync --locked

      - name: Node 설치 (대시보드 SPA 빌드용)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 대시보드 SPA 빌드
        # C2 컷오버로 FastAPI 가 SPA 정적 산출물을 루트(/)로 서빙한다 — 통합 테스트가
        # SPA 셸 라우트(예: GET /·/login)를 200 으로 받으려면 frontend/build 가 필요하다.
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Playwright 브라우저 캐시
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          # uv.lock 의 무관한 패키지 변경으로 키가 빗나가도 직전 캐시에서 복원해
          # chromium 통째 재다운로드를 피한다 (버전이 같으면 install 이 즉시 끝남).
          restore-keys: playwright-${{ runner.os }}-

      - name: Chromium 설치
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install --with-deps chromium

      - name: Chromium 시스템 의존성 설치 (캐시 히트 시)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: uv run playwright install-deps chromium

      - name: 테스트
        run: uv run pytest -v
