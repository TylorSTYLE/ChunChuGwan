name: Release

# PR 가 main 에 머지될 때 PR 라벨(release:major/minor/patch)로 다음 버전을 결정해
# pyproject.toml 갱신 + vX.Y.Z 태그 + GitHub Release 를 자동 등록한다.
# 태그가 찍히면 docker.yml 이 반응해 버전 이미지를 빌드한다.
#
# 라벨이 없거나 release:skip 이면 아무것도 하지 않는다.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # 머지된 PR 만 (단순 close 는 제외)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: bump 레벨 결정
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          # major > minor > patch 우선순위
          case " $LABELS " in
            *" release:major "*) bump=major ;;
            *" release:minor "*) bump=minor ;;
            *" release:patch "*) bump=patch ;;
            *) bump="" ;;
          esac
          if [ -z "$bump" ]; then
            echo "릴리스 라벨 없음 — 스킵 (labels: $LABELS)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "bump=$bump" >> "$GITHUB_OUTPUT"
          fi

      - name: 체크아웃
        if: steps.bump.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          # 직접 push 가 막힌 보호 브랜치라면 PAT 를 RELEASE_TOKEN 으로 넣는다.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 다음 버전 계산
        if: steps.bump.outputs.skip != 'true'
        id: ver
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          # 기준 버전: 최신 v 태그 우선, 없으면 pyproject.toml
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -n "$latest_tag" ]; then
            base="${latest_tag#v}"
          else
            base=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "([^"]+)".*/\1/')
          fi
          # 프리릴리스/빌드 메타 제거 후 major.minor.patch 분해
          base="${base%%[-+]*}"
          # 비정상 base 로 산술이 0/에러로 새지 않게 3-파트 숫자 semver 만 허용
          if [[ ! "$base" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::기준 버전이 정상 semver 가 아니다 (base=$base)"; exit 1
          fi
          IFS='.' read -r major minor patch <<< "$base"
          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="${major}.${minor}.${patch}"
          if git rev-parse "v$next" >/dev/null 2>&1; then
            echo "::error::v$next 태그가 이미 존재한다 (base=$base, bump=$BUMP)"
            exit 1
          fi
          echo "base=$base"   >> "$GITHUB_OUTPUT"
          echo "next=$next"   >> "$GITHUB_OUTPUT"
          echo "기준 $base → $BUMP → v$next"

      - name: uv 설치
        if: steps.bump.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          # 호스티드 러너는 런마다 새 VM 이라 로컬 uv 캐시가 보존되지 않는다.
          # GHA 캐시를 켜 의존성 다운로드를 런 간 재사용한다.
          enable-cache: true
          python-version: "3.14"

      - name: pyproject.toml · uv.lock · 릴리스 노트 번들 갱신 · 태그 · 푸시
        id: push
        if: steps.bump.outputs.skip != 'true'
        env:
          NEXT: ${{ steps.ver.outputs.next }}
          PR_NUM: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # 릴리스 노트 번들 — 이 버전의 변경 항목(@수정자·링크 제거, PR 번호만)을
          # release_notes.json 에 써넣어 이미지에 동봉한다(대시보드 업데이트 안내 모달).
          # 이전 태그는 GitHub 가 자동 판정한다(release create --generate-notes 와 동일).
          # 실패해도 릴리스는 막지 않는다(이 버전은 안내 모달만 비게 됨).
          if notes=$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="v$NEXT" -f target_commitish="$(git rev-parse HEAD)" --jq .body) \
              && [ -n "$notes" ]; then
            printf '%s\n' "$notes" | python3 scripts/gen_release_notes.py "$NEXT" \
              || echo "::warning::릴리스 노트 번들 생성 실패 — 안내 모달 없이 진행"
          else
            echo "::warning::generate-notes 실패 — 릴리스 노트 번들 건너뜀"
          fi
          sed -i -E "0,/^version = \".*\"/s//version = \"$NEXT\"/" pyproject.toml
          # uv.lock 안의 자기 버전(editable .)도 동기화
          uv lock
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chunchugwan/web/release_notes.json
          git commit -am "춘추관 v$NEXT (#$PR_NUM)"
          git tag -a "v$NEXT" -m "v$NEXT"
          git push origin HEAD:main
          git push origin "v$NEXT"

      - name: SBOM 생성 (CycloneDX)
        # Release 생성보다 먼저 만들어 생성 시점에 자산으로 동봉한다 — immutable
        # release 는 게시 후 자산 추가/교체(upload --clobber)를 422 로 거부하기 때문.
        # 실패해도 릴리스·FF 를 막지 않는다(continue-on-error): 산출물은 SBOM 뿐이며
        # 뒤따르는 develop FF 동기화가 스킵되지 않게 한다.
        if: steps.bump.outputs.skip != 'true'
        continue-on-error: true
        id: sbom
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          # 런타임 전용 의존성 폐포를 설치한 뒤 그 환경의 패키지 메타데이터로 SBOM 생성.
          # environment 모드라야 컴포넌트별 라이선스가 채워진다(requirements 모드는 비움).
          uv sync --frozen --no-dev
          sbom="chunchugwan-v$NEXT.cdx.json"
          uvx --from 'cyclonedx-bom>=7,<8' cyclonedx-py environment .venv/bin/python \
            --of JSON -o "$sbom" --pyproject pyproject.toml
          echo "path=$sbom" >> "$GITHUB_OUTPUT"

      - name: GitHub Release 생성 (SBOM 동봉)
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SBOM: ${{ steps.sbom.outputs.path }}
        run: |
          # SBOM 생성이 성공했을 때만 자산으로 첨부(생성 단계는 continue-on-error 라
          # 실패 시 SBOM 이 빈 문자열). immutable release 와 호환되도록 create 시점에 동봉.
          gh release create "v$NEXT" \
            --title "v$NEXT" \
            --notes "$PR_TITLE ($PR_URL)" \
            --generate-notes \
            ${SBOM:+"$SBOM"}

      - name: develop 를 릴리스 커밋으로 동기화 (FF)
        # 핵심 커밋·태그·main 푸시(steps.push)가 성공했으면, 그 뒤 SBOM/Release 생성이
        # 실패해도 FF 는 반드시 돈다 — gitflow 불변식(develop = main 조상)을 지킨다.
        # 반대로 main 푸시 자체가 실패했으면 FF 도 건너뛴다(불완전 상태를 develop 에 밀지 않음).
        if: ${{ !cancelled() && steps.bump.outputs.skip != 'true' && steps.push.outcome == 'success' }}
        run: |
          # 릴리스 후 main = develop + 버전 범프 커밋. develop 를 main 으로 FF 해
          # 다음 사이클의 develop→main diff 가 버전 파일 되돌림으로 보이지 않게 한다.
          # (develop→main 을 merge 커밋으로 머지하면 develop 가 main 의 조상이라 FF 됨)
          git push origin HEAD:develop || \
            echo "::warning::develop FF 동기화 실패 — develop 를 main 으로 수동 동기화 필요 (squash 머지 시 발생)"
