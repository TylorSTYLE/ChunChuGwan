name: Release

# 역할 분담 — 버전 산출·매니페스트 범핑·PR·병합·태깅은 gitflow 스킬(release.md,
# Conventional Commits 기반 SemVer + 확인 게이트)이 담당한다. 이 워크플로는
# 태그 push 이후만 자동화한다: SBOM 생성 + 라이선스 게이트 + GitHub Release 생성.
# release-please·semantic-release 류의 CI 주도 버전 자동화는 채택하지 않는다
# (균일 운영 원칙 — 전 프로젝트 단일 릴리스 모델).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: uv 설치
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: SBOM 생성 (CycloneDX)
        # SBOM 스텝 실패 = release 실패(하드 게이트 — 표준 §8.3). 게시 후 첨부는
        # immutable release 에서 422 로 거부되므로 생성 시점 동봉이 유일한 경로다.
        id: sbom
        run: |
          # 런타임 전용 의존성 폐포를 설치한 뒤 그 환경의 패키지 메타데이터로 SBOM 생성.
          # environment 모드라야 컴포넌트별 라이선스가 채워진다(requirements 모드는 비움).
          uv sync --frozen --no-dev
          sbom="chunchugwan-${GITHUB_REF_NAME}.cdx.json"
          uvx --from 'cyclonedx-bom==7.3.0' cyclonedx-py environment .venv/bin/python \
            --of JSON -o "$sbom" --pyproject pyproject.toml
          echo "path=$sbom" >> "$GITHUB_OUTPUT"

      - name: 라이선스 정책 검사 (grant — SBOM 기반)
        run: |
          curl -sSfLO "https://github.com/anchore/grant/releases/download/v0.6.7/grant_0.6.7_linux_amd64.tar.gz"
          echo "66572af8d363b87f010195215d90649effa94f26a6e9ef7d181a7874a3959560  grant_0.6.7_linux_amd64.tar.gz" | sha256sum -c -
          tar -xzf grant_0.6.7_linux_amd64.tar.gz grant
          ./grant check "${{ steps.sbom.outputs.path }}" --config .grant.yaml

      - name: GitHub Release 생성 (자동 노트 + SBOM 동봉)
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag "${{ steps.sbom.outputs.path }}"
        env:
          GH_TOKEN: ${{ github.token }}
