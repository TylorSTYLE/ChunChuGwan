services:
  dashboard:
    build: .
    command: serve
    environment:
      WCCG_HOST: "0.0.0.0"          # 컨테이너 내부 바인딩. 외부 노출은 아래 127.0.0.1 매핑이 차단.
    ports:
      - "127.0.0.1:8765:8765"       # localhost 전용 원칙 유지
    volumes:
      - ./archive:/data/archive
    shm_size: 1gb                   # 재아카이빙 버튼이 chromium 을 띄우므로 /dev/shm 확보
    init: true                      # 좀비 chromium 프로세스 회수
    restart: unless-stopped

  cli:
    build: .
    profiles: ["cli"]               # `docker compose up` 시 기동되지 않음
    volumes:
      - ./archive:/data/archive
    shm_size: 1gb
    init: true
