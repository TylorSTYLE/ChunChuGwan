{% extends "base.html" %}
{% block title %}로그인 — Web Archiver{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>로그인</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label>이메일
      <input type="email" name="email" value="{{ email }}" required autofocus>
    </label>
    <label>패스워드
      <input type="password" name="password" required>
    </label>
    <button type="submit">로그인</button>
  </form>
  {% if oidc_enabled %}
  <div class="alt">
    <a href="/auth/oidc/login?next={{ next | urlencode }}">Authentik으로 로그인 →</a>
  </div>
  {% endif %}
  <div class="alt muted">계정이 없나요? <a href="/signup">가입하기</a></div>
</div>
{% endblock %}
