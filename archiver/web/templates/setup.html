{% extends "base.html" %}
{% block title %}관리자 등록 — Web Archiver{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>관리자 등록</h2>
  <p class="muted">최초 구동입니다. 대시보드를 사용하려면 먼저 관리자 계정을
     등록하세요. 이 페이지는 등록이 끝나면 다시 표시되지 않습니다.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/setup">
    <label>관리자 이메일
      <input type="email" name="email" value="{{ email }}" required autofocus>
    </label>
    <label>패스워드 <span class="muted">(8자 이상)</span>
      <input type="password" name="password" minlength="8" required>
    </label>
    <button type="submit">등록</button>
  </form>
</div>
{% endblock %}
