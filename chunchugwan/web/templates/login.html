{% extends "auth_base.html" %}
{% block title %}{{ _("로그인") }} — {{ _("춘추관") }}{% endblock %}
{% block card %}
<div class="auth-card">
  <h2>{{ _("로그인") }}</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label>{{ _("이메일") }}
      <input type="email" name="email" value="{{ email }}" required autofocus>
    </label>
    <label>{{ _("패스워드") }}
      <input type="password" name="password" required>
    </label>
    <button type="submit">{{ _("로그인") }}</button>
  </form>
  {% if oidc_enabled %}
  <div class="alt">
    <a href="/auth/oidc/login?next={{ next | urlencode }}">{{ _("Authentik으로 로그인 →") }}</a>
  </div>
  {% endif %}
  <div class="alt muted">{{ _("계정이 없나요?") }} <a href="/signup">{{ _("가입하기") }}</a></div>
</div>
{% endblock %}
