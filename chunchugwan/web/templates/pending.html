{% extends "auth_base.html" %}
{% block title %}{{ _("가입 승인 대기 중") }} — {{ _("춘추관") }}{% endblock %}
{% block card %}
<div class="auth-card">
  <h2>{{ _("가입 승인 대기 중") }}</h2>
  <p style="font-size:13px; line-height:1.7; margin:0 0 10px">
    {{ _("가입해 주셔서 감사합니다. 현재 계정은 관리자의 승인을 기다리고 있습니다.") }}
  </p>
  <p class="muted" style="font-size:12px; line-height:1.7; margin:0 0 14px">
    {{ _("관리자가 권한을 부여하면 바로 이용할 수 있습니다. 잠시 후 다시 방문해 주세요.") }}
  </p>
  <div class="mono muted" style="font-size:12px; margin-bottom:14px">{{ email }}</div>
  <form method="post" action="/logout">
    <button type="submit">{{ _("로그아웃") }}</button>
  </form>
</div>
{% endblock %}
