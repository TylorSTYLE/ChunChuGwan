{% extends "base.html" %}
{% block title %}{{ _("가입") }} — {{ _("춘추관") }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>{{ _("가입") }}</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/signup">
    <label>{{ _("이메일") }}
      <input type="email" name="email" value="{{ email }}" required autofocus>
    </label>
    <label>{{ _("패스워드") }} <span class="muted">{{ _("(8자 이상)") }}</span>
      <input type="password" name="password" minlength="8" required>
    </label>
    <button type="submit">{{ _("가입") }}</button>
  </form>
  <div class="alt muted">{{ _("이미 계정이 있나요?") }} <a href="/login">{{ _("로그인") }}</a></div>
</div>
{% endblock %}
