<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}춘추관{% endblock %}</title>
<script>
/* 테마 적용 — 저장값(light|dark) 없으면 시스템 설정. 첫 페인트 전에 실행해 깜빡임 방지 */
(function () {
  var KEY = "wccg-theme";
  var mq = window.matchMedia("(prefers-color-scheme: dark)");
  function stored() {
    try { var v = localStorage.getItem(KEY); } catch (e) { return null; }
    return v === "light" || v === "dark" ? v : null;
  }
  function apply() {
    document.documentElement.dataset.theme = stored() || (mq.matches ? "dark" : "light");
  }
  mq.addEventListener("change", function () { if (!stored()) apply(); });
  apply();
  window.wccgTheme = { KEY: KEY, stored: stored, apply: apply };
})();
</script>
<style>
:root {
  color-scheme: light;
  --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280; --border: #e2e2e2;
  --bg-soft: #f7f7f7; --surface: #ffffff;
  --amber: #92400e; --amber-bg: #fef3c7;
  --green: #166534; --green-bg: #dcfce7;
  --gray: #374151;  --gray-bg: #e5e7eb;
  --blue: #1e40af;  --blue-bg: #dbeafe;
  --red-bg: #fee2e2; --red: #dc2626; --red-text: #991b1b; --red-hover: #b91c1c;
  --link: #1d4ed8;
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --bg: #14171a; --fg: #dde1e6; --muted: #8b929b; --border: #2c3138;
  --bg-soft: #1c2025; --surface: #1c2025;
  --amber: #fbbf24; --amber-bg: #423008;
  --green: #4ade80; --green-bg: #15301f;
  --gray: #c3c9d1;  --gray-bg: #343a42;
  --blue: #93c5fd;  --blue-bg: #1e3a5f;
  --red-bg: #3f181b; --red: #dc2626; --red-text: #f87171; --red-hover: #b91c1c;
  --link: #60a5fa;
}
* { box-sizing: border-box; }
body { font-family: system-ui, sans-serif; margin: 0; color: var(--fg); font-size: 14px;
       background: var(--bg); }
header { border-bottom: 1px solid var(--border); padding: 8px 16px;
         display: flex; gap: 16px; align-items: baseline; }
header h1 { font-size: 15px; margin: 0; }
header h1 a { color: var(--fg); text-decoration: none; }
main { padding: 16px; max-width: 1280px; margin: 0 auto; }
h2 { font-size: 16px; margin: 0 0 12px; }
h3 { font-size: 13px; color: var(--muted); margin: 24px 0 8px;
     text-transform: uppercase; letter-spacing: .04em; }
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
table { border-collapse: collapse; width: 100%; font-size: 13px; }
th, td { text-align: left; padding: 5px 10px; border-bottom: 1px solid var(--border); }
/* 긴 URL 등 공백 없는 문자열이 셀/제목 폭을 밀어내지 않도록 줄바꿈 허용 */
td, h2, .notice { overflow-wrap: anywhere; }
th { color: var(--muted); font-weight: 600; font-size: 11px;
     text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
td.num { text-align: right; color: var(--muted); }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
.muted { color: var(--muted); }
.badge { display: inline-block; font-size: 11px; font-weight: 600;
         padding: 1px 7px; border-radius: 9px; white-space: nowrap; }
.badge.changed { color: var(--amber); background: var(--amber-bg); }
.badge.same    { color: var(--gray);  background: var(--gray-bg); }
.badge.new     { color: var(--green); background: var(--green-bg); }
.badge.error   { color: var(--red-text); background: var(--red-bg); }
.badge.role-admin    { color: var(--green); background: var(--green-bg); }
.badge.role-archiver { color: var(--blue);  background: var(--blue-bg); }
.badge.role-viewer   { color: var(--gray);  background: var(--gray-bg); }
.badge.role-blocked  { color: var(--red-text); background: var(--red-bg); }
.badge.running { color: var(--blue);  background: var(--blue-bg);
                 animation: badge-pulse 1.4s ease-in-out infinite; }
@keyframes badge-pulse { 50% { opacity: .45; } }
button, select, input[type=number], input[type=text], input[type=url],
input[type=email], input[type=password] {
  font: inherit; font-size: 13px; padding: 3px 10px;
  border: 1px solid var(--border); border-radius: 4px; background: var(--surface);
  color: var(--fg);
}
button { cursor: pointer; }
button:hover { background: var(--bg-soft); }
button.active { background: var(--gray-bg); border-color: var(--gray); }
form.inline { display: inline; }
.notice { background: var(--green-bg); color: var(--green); border-radius: 4px;
          padding: 6px 12px; margin-bottom: 12px; font-size: 13px; }
.toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
           flex-wrap: wrap; }
.toolbar .spacer { flex: 1; }
header .spacer { flex: 1; }
.auth-card { max-width: 360px; margin: 48px auto; border: 1px solid var(--border);
             border-radius: 6px; padding: 20px 24px; }
.auth-card label { display: block; margin-bottom: 10px; font-size: 13px; }
.auth-card input { display: block; width: 100%; margin-top: 3px; padding: 5px 10px; }
.auth-card button[type=submit] { width: 100%; margin-top: 4px; padding: 6px; }
.auth-card .alt { margin-top: 14px; padding-top: 12px;
                  border-top: 1px solid var(--border); font-size: 13px; }
/* 에러 메시지 박스 — div 한정 (span.badge.error 와 충돌 방지) */
div.error { background: var(--red-bg); color: var(--amber); border-radius: 4px;
            padding: 6px 12px; margin-bottom: 12px; font-size: 13px; }
fieldset.danger-zone { border: 1px solid var(--red); border-radius: 6px;
                       margin-top: 28px; padding: 10px 14px 14px; }
fieldset.danger-zone legend { color: var(--red); font-size: 12px; font-weight: 600;
                              text-transform: uppercase; letter-spacing: .04em;
                              padding: 0 4px; }
button.danger { color: #fff; background: var(--red); border-color: var(--red); }
button.danger:hover { background: var(--red-hover); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<header>
  <h1><a href="/">춘추관</a></h1>
  <span class="muted" style="font-size:12px">개인 웹 아카이브</span>
  <a href="/dashboard" style="font-size:12px">현황</a>
  <a href="/archives" style="font-size:12px">목록</a>
  {% if can_archive %}
  <a href="/archive/new" style="font-size:12px">새 아카이빙</a>
  {% endif %}
  <a href="/schedules" style="font-size:12px">스케줄</a>
  <a href="/logs" style="font-size:12px">로그</a>
  {% if system_allowed %}
  <a href="/system/users" style="font-size:12px">사용자</a>
  <a href="/system" style="font-size:12px">시스템</a>
  {% endif %}
  <span class="spacer"></span>
  <button type="button" id="theme-toggle" title="테마 전환 (자동 → 라이트 → 다크)"></button>
  {% if user %}
  <span class="mono muted">{{ user['display_name'] or user['email'] }}</span>
  <a href="/settings/account" style="font-size:12px">계정</a>
  <form class="inline" method="post" action="/logout"><button>로그아웃</button></form>
  {% endif %}
</header>
<main>{% block content %}{% endblock %}</main>
<script>
/* 테마 토글 — 자동(시스템) → 라이트 → 다크 순환, localStorage 에 기억 */
(function () {
  var btn = document.getElementById("theme-toggle");
  var LABELS = { auto: "테마: 자동", light: "테마: 라이트", dark: "테마: 다크" };
  var NEXT = { auto: "light", light: "dark", dark: "auto" };
  function mode() { return wccgTheme.stored() || "auto"; }
  function render() { btn.textContent = LABELS[mode()]; }
  btn.addEventListener("click", function () {
    var next = NEXT[mode()];
    try {
      if (next === "auto") localStorage.removeItem(wccgTheme.KEY);
      else localStorage.setItem(wccgTheme.KEY, next);
    } catch (e) { /* localStorage 불가 환경에서는 시스템 설정 유지 */ }
    wccgTheme.apply();
    render();
  });
  render();
})();
</script>
</body>
</html>
