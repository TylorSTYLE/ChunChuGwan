{# 언어 선택 — 헤더(전체 메뉴)와 인증 화면 헤더가 공용으로 쓴다. #}
<form class="inline" method="post" action="/lang">
  <input type="hidden" name="next"
         value="{{ request.url.path }}{% if request.url.query %}?{{ request.url.query }}{% endif %}">
  <select name="lang" onchange="this.form.submit()" title="{{ _('언어') }}"
          aria-label="{{ _('언어') }}">
    {% for code in locales %}
    <option value="{{ code }}" {% if code == locale %}selected{% endif %}>{{ locale_names[code] }}</option>
    {% endfor %}
  </select>
</form>
