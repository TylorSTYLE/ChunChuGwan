<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --fg: #1c1c1a; --muted: #6b6b66; --bg: #fff; --soft: #f4f2ec;
      --border: #d9d6cd; --accent: #1d6e56; --danger: #a32d2d;
      --amber: #854f0b; --green: #3b6d11; --gray: #5f5e5a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e7e5df; --muted: #9d9b94; --bg: #1c1c1a; --soft: #2a2a27;
        --border: #44443f; --accent: #5dcaa5; --danger: #f09595;
        --amber: #ef9f27; --green: #97c459; --gray: #b4b2a9;
      }
    }
    * { box-sizing: border-box; }
    body {
      width: 360px; margin: 0; font: 13px/1.5 system-ui, sans-serif;
      color: var(--fg); background: var(--bg);
    }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    header {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }
    .url { font-size: 11px; word-break: break-all; color: var(--muted); }
    .conn { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray); }
    .dot.on { background: var(--green); }
    nav { display: flex; border-bottom: 1px solid var(--border); }
    nav button {
      flex: 1; padding: 8px 4px; border: 0; background: none; cursor: pointer;
      font: inherit; font-size: 12px; color: var(--muted);
      border-bottom: 2px solid transparent;
    }
    nav button.active { color: var(--fg); border-bottom-color: var(--accent); }
    .tab { display: none; padding: 12px; }
    .tab.active { display: block; }
    h3 { margin: 0 0 6px; font-size: 13px; font-weight: 600; }
    p.muted { color: var(--muted); font-size: 11px; margin: 4px 0; }
    label { display: block; font-size: 11px; color: var(--muted); margin: 8px 0 2px; }
    input[type=text], input[type=password], input[type=number] {
      width: 100%; padding: 5px 6px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--bg); color: var(--fg); font: inherit;
    }
    button.btn {
      padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
      background: var(--soft); color: var(--fg); cursor: pointer; font: inherit;
      font-size: 12px; margin-top: 8px;
    }
    button.btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    button.btn.danger { color: var(--danger); }
    button.btn:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .note { padding: 8px; border-radius: 4px; background: var(--soft); font-size: 11px; margin-top: 8px; }
    .note.warn { color: var(--amber); }
    .note.err { color: var(--danger); }
    .badge {
      display: inline-block; padding: 0 5px; border-radius: 3px; font-size: 10px;
      border: 1px solid var(--border);
    }
    .badge.changed { color: var(--amber); }
    .badge.same { color: var(--gray); }
    .badge.new { color: var(--green); }
    .snap { padding: 6px 0; border-top: 1px solid var(--border); cursor: pointer; }
    .snap:hover { background: var(--soft); }
    .snap .ts { font-size: 11px; }
    .snap .hash { font-size: 10px; color: var(--muted); }
    details summary { cursor: pointer; font-size: 11px; color: var(--muted); margin-top: 8px; }
    .consent { display: flex; gap: 6px; align-items: flex-start; margin-top: 8px; font-size: 11px; }
  </style>
</head>
<body>
  <header>
    <div class="url mono" id="cur-url">—</div>
    <div class="conn"><span class="dot" id="conn-dot"></span><span id="conn-text" data-i18n="header_not_connected"></span></div>
  </header>

  <!-- 업데이트 안내 (서버가 더 최신일 때만 노출 — popup.js 가 표시) -->
  <div class="note warn" id="update-banner" style="display:none;border-radius:0;margin-top:0">
    <span id="update-text"></span>
    <button class="btn primary" id="update-reinstall" style="margin-top:6px" data-i18n="update_reinstall"></button>
  </div>

  <nav>
    <button data-tab="connect" data-i18n="tab_connect" class="active"></button>
    <button data-tab="archive" data-i18n="tab_archive"></button>
    <button data-tab="history" data-i18n="tab_history"></button>
  </nav>

  <!-- 연결 -->
  <section class="tab active" id="tab-connect">
    <h3 data-i18n="tab_connect"></h3>

    <!-- 미연결: 주소 + 토큰 입력 폼 -->
    <div id="connect-form">
      <p class="muted" data-i18n="connect_intro"></p>
      <label data-i18n="connect_base_url"></label>
      <input type="text" id="base-url" placeholder="https://archive.example.com">
      <button class="btn" id="open-issue" data-i18n="connect_open_issue"></button>
      <label data-i18n="connect_token"></label>
      <input type="password" id="token" class="mono" placeholder="wccg_…">
      <div class="note warn" data-i18n="connect_warn"></div>
      <button class="btn primary" id="connect-btn" data-i18n="connect_save"></button>
    </div>

    <!-- 연결됨: 연결 정보 + 해제 -->
    <div id="connected-info" style="display:none">
      <div class="note" id="connected-detail"></div>
      <button class="btn danger" id="disconnect-btn" data-i18n="connect_disconnect"></button>
    </div>

    <div class="note" id="connect-result" style="display:none"></div>
  </section>

  <!-- 아카이브 -->
  <section class="tab" id="tab-archive">
    <h3 data-i18n="tab_archive"></h3>
    <p class="muted" data-i18n="archive_intro"></p>

    <!-- 페이지 메모 (선택) — 캡처/아카이브 성공 후 이 URL 의 페이지 메모로 등록된다. -->
    <label class="memo-label" data-i18n="memo_label" for="capture-memo"></label>
    <textarea id="capture-memo" rows="2" data-i18n-ph="memo_ph"></textarea>

    <!-- 브라우저 캡처 (서버 무요청 — 지금 보고 있는 화면을 그대로) -->
    <button class="btn primary" id="capture-browser" data-i18n="capture_btn"></button>
    <p class="muted" data-i18n="capture_hint"></p>
    <div class="note warn" id="capture-notice" data-i18n="capture_notice"></div>
    <!-- 사설 호스트 네트워크 태그 (서버가 태그를 요구하면 노출) -->
    <div id="tag-picker" style="display:none">
      <p class="muted" data-i18n="tag_pick_hint"></p>
      <label data-i18n="tag_pick_label"></label>
      <select id="tag-select"></select>
      <label data-i18n="tag_new_label"></label>
      <div class="row">
        <input type="text" id="tag-new" placeholder="사무실">
        <button class="btn" id="tag-add" data-i18n="tag_add"></button>
      </div>
    </div>

    <hr style="border:0;border-top:1px solid var(--border);margin:12px 0">
    <p class="muted" data-i18n="archive_server_intro"></p>
    <div class="row">
      <button class="btn" id="archive-page" data-i18n="archive_page_btn"></button>
      <button class="btn" id="archive-site" data-i18n="archive_site_btn"></button>
    </div>
    <label class="consent"><input type="checkbox" id="force"><span data-i18n="archive_force"></span></label>
    <label class="consent"><input type="checkbox" id="protect-share"><span data-i18n="archive_protect_share"></span></label>
    <label class="consent"><input type="checkbox" id="with-login"><span data-i18n="archive_with_login"></span></label>
    <div id="login-info" style="display:none">
      <p class="muted" id="login-cookie-count"></p>
      <div class="note" data-i18n="archive_login_note"></div>
    </div>
    <p class="muted" id="login-hint" style="display:none"></p>
    <label class="consent"><input type="checkbox" id="notify-toggle"><span data-i18n="archive_notify_toggle"></span></label>
    <label class="consent"><input type="checkbox" id="status-badge-toggle"><span data-i18n="status_badge_toggle"></span></label>
    <details>
      <summary data-i18n="archive_site_options"></summary>
      <label data-i18n="archive_max_pages"></label>
      <input type="number" id="max-pages" min="1" placeholder="100">
      <label data-i18n="archive_max_depth"></label>
      <input type="number" id="max-depth" min="0" placeholder="5">
      <label data-i18n="archive_delay"></label>
      <input type="number" id="delay" min="0" placeholder="5">
    </details>
    <div class="note" id="archive-result" style="display:none"></div>
  </section>

  <!-- 히스토리 -->
  <section class="tab" id="tab-history">
    <h3 data-i18n="tab_history"></h3>
    <button class="btn" id="open-dashboard" data-i18n="history_open_dashboard"></button>
    <div id="history-list"></div>
    <div class="note" id="history-result" style="display:none"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
