# 디버그 진단 포트 오버레이 — develop/테스트 서버 전용. **릴리스에는 쓰지 않는다.**
#
# serve(dashboard)·worker 가 별도 포트(컨테이너 내부 8799, web/debug_server.py)에
# 진단 엔드포인트를 연다 — 내부 상태 조회(읽기) + 안전한 트리거(1회성 캡처·스케줄
# 1회 실행). 같은 LAN 의 다른 머신(예: 개발 PC)에서 바로 접근해 문제를 빠르게
# 진단하기 위함이다.
#
# 사용 (develop 이미지 + 디버그 노출):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml \
#                  -f docker-compose.debug.yml up -d
# .env 한 줄로 자동 적용도 가능:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml:docker-compose.debug.yml
#
# 접근 (같은 네트워크의 개발 PC 에서):
#   curl http://<서버-LAN-IP>:8799/debug/health     # worker (캡처·큐 상태)
#   curl http://<서버-LAN-IP>:8798/debug/health     # dashboard (API/서빙 상태)
#
# 보안: 호스트 포트 매핑이 0.0.0.0(모든 인터페이스)이라 LAN 의 누구나 닿는다.
# 시크릿은 노출되지 않지만(원칙 6), 내부 상태가 보이므로 develop 전용으로만 쓰고,
# 더 조이려면 아래 WCCG_DEBUG_TOKEN 을 켜서 X-Debug-Token 헤더를 요구한다.
services:
  dashboard:
    environment:
      WCCG_DEBUG: "on"
      WCCG_DEBUG_HOST: "0.0.0.0"      # 컨테이너 내부 바인딩 — 호스트 매핑으로 LAN 노출
      # WCCG_DEBUG_TOKEN: "change-me" # 설정 시 모든 디버그 요청에 X-Debug-Token 헤더 요구
    ports:
      - "8798:8799"                   # 호스트 8798 → dashboard 컨테이너 8799 (worker 와 충돌 회피)

  worker:
    environment:
      WCCG_DEBUG: "on"
      WCCG_DEBUG_HOST: "0.0.0.0"
      # WCCG_DEBUG_TOKEN: "change-me"
    ports:
      - "8799:8799"                   # 호스트 8799 → worker 컨테이너 8799 (캡처·큐가 도는 프로세스)
