# grant(anchore/grant) 설정. 표준 문서(부트스트랩 §8.4)의 rules/pattern/mode 예시는
# 구버전 스키마로 현재 grant CLI(v0.6.x)가 인식하지 못해 전량 거부로 무의미해짐을
# 실측 확인 — 현재 스키마(allow 목록, 미명시=거부)로 재작성했다.
#
# §8.4 허용 표(MIT/Apache-2.0/BSD-2/3-Clause/ISC/Zlib) 기준 + 실제 의존성 트리에서
# 확인된 라이선스(구버전 PyPI classifier 표기 포함, SPDX 미표준화 상태 그대로 남는
# 패키지가 있어 문자열로 병기)를 등재한다. 새 의존성이 여기 없는 라이선스를 쓰면
# 검사가 실패해 검토를 요구한다 — 이게 게이트의 목적이다.
allow:
    - MIT
    - MIT-CMU
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - Zlib
    - PSF-2.0
    # MPL-2.0(certifi) — §8.4 "검토 후 허용" 티어. 무수정 사용이라 허용.
    - MPL-2.0
    - "License :: OSI Approved :: Apache Software License"
    - "License :: OSI Approved :: BSD License"
    - "License :: OSI Approved :: Mozilla Public License 2.0 (MPL 2.0)"
    # qrcode 부수 classifier — 실제 배포 라이선스는 BSD(위 항목과 병기되어 나타남).
    - "License :: Other/Proprietary License"
require-license: true
