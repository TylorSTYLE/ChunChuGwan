# 예제 Compose 파일 — 복사해서 사용한다 (compose.yaml 은 gitignore 대상):
#
#   cp compose.example.yaml compose.yaml
#
# 포트·환경변수 등 개인 설정은 복사한 compose.yaml 에서만 수정할 것.
# 환경변수 전체 목록은 docs/AUTHENTICATION.md "환경변수" 절 참조.
services:
  dashboard:
    image: ghcr.io/tylorstyle/chunchugwan:latest   # GitHub Actions 가 main 푸시마다 게시 (amd64/arm64)
    # build: .                      # 로컬 소스에서 직접 빌드하려면 image: 줄 대신 사용
    command: serve
    depends_on: [worker]            # `up -d dashboard` 만으로도 워커가 같이 뜨게
    environment:
      WCCG_HOST: "0.0.0.0"          # 컨테이너 내부 바인딩. 외부 노출은 아래 127.0.0.1 매핑이 차단.
      WCCG_SCHEDULER: "off"         # 단발 아카이빙·스케줄·크롤 실행은 worker 전담 — 대시보드 응답이 안 느려진다
      TZ: "Asia/Seoul"              # 1일 주기 스케줄의 실행 시각(HH:MM)이 서버 로컬 시간 기준 — 미설정 시 UTC
      WCCG_LOG_FILE: "/data/logs/dashboard.log"   # 콘솔 로그를 ./logs 볼륨에 회전 파일로 남김 (서비스별 파일)
      # --- 선택 설정: 필요한 항목만 주석 해제 ---
      # WCCG_ADMIN_EMAIL: "admin@example.com"        # 최초 구동 시 관리자 자동 등록
      # WCCG_ADMIN_PASSWORD: "change-me"             # (8자 이상, 최초 구동 후 제거 권장)
      # WCCG_PUBLIC_URL: "https://archive.example.com"  # 리버스 프록시로 외부 노출 시
      # WCCG_SESSION_TTL_DAYS: "14"                  # 세션 수명 (일)
      # WCCG_OIDC_ISSUER: "https://auth.example.com/application/o/chunchugwan"
      # WCCG_OIDC_CLIENT_ID: ""
      # WCCG_OIDC_CLIENT_SECRET: ""
      # WCCG_SMTP_HOST: "smtp.example.com"           # 초대 메일 발송용 — 미설정 시 초대 링크를 화면에 표시
      # WCCG_SMTP_PORT: "587"
      # WCCG_SMTP_USER: ""                           # 없으면 SMTP 인증 생략
      # WCCG_SMTP_PASSWORD: ""
      # WCCG_SMTP_FROM: ""                           # 발신자 주소 (기본: WCCG_SMTP_USER)
      # WCCG_SMTP_TLS: "starttls"                    # starttls | ssl | off
      # WCCG_INVITE_TTL_DAYS: "7"                    # 초대 링크 수명 (일)
      # 스텔스 캡처(WCCG_CAPTURE_*)는 dashboard 엔 설정하지 않는다 — 재아카이빙
      # 버튼을 포함한 모든 캡처는 worker 가 큐를 소비해 실행하므로 worker 에만 둔다.
    ports:
      - "127.0.0.1:8765:8765"       # localhost 전용 원칙 유지. 외부 노출은 리버스 프록시를 앞단에 둘 것.
    volumes:
      - ./archive:/data/archive     # 소유자가 달라도 기동 시 uid 1000 으로 자동 보정
      - ./logs:/data/logs           # 콘솔 로그 파일을 호스트에 노출 (./logs/dashboard.log 등)
    init: true                      # 프로세스 신호 처리/좀비 회수 (dashboard 는 캡처를 안 해 shm_size 불필요)
    restart: unless-stopped

  worker:
    image: ghcr.io/tylorstyle/chunchugwan:latest
    # build: .                      # 로컬 소스에서 직접 빌드하려면 image: 줄 대신 사용
    command: worker                 # 단발 아카이빙·스케줄·크롤 큐 소비 — 모든 캡처가 여기서 실행된다
    environment:
      TZ: "Asia/Seoul"
      WCCG_LOG_FILE: "/data/logs/worker.log"   # 캡처/아카이빙 로그가 여기에 남는다 (트레이스백 포함)
      # worker 는 작업 시작/완료·실패를 콘솔(docker compose logs worker)에도 INFO 로 남긴다 (--quiet 로 끔)
      # WCCG_CRAWL_WORKERS: "2"     # 동시 진행 크롤(사이트) 수 (1~8, 기본 2)
      # --- 스텔스 캡처 (Cloudflare Turnstile 등 봇차단 페이지 통과 시도) ---
      # 모든 캡처(새/재아카이빙·스케줄·크롤)가 worker 에서 실행되므로 여기에만 켜면 된다.
      # 이미지에 patchright·Xvfb·real Chrome(amd64) 포함. 단 데이터센터 IP 평판으로
      # 막힐 수 있고(엔진으론 못 고침), ToS 회색지대다.
      # WCCG_CAPTURE_ENGINE: "patchright"   # Runtime.enable 봇탐지 우회 드롭인 엔진
      # WCCG_CAPTURE_HEADFUL: "on"          # Xvfb 가상 디스플레이로 헤드풀 실행 (탐지 회피)
      # WCCG_CAPTURE_CHANNEL: "chrome"      # real Chrome (amd64). arm64 는 자동으로 번들 chromium 폴백 — 그냥 둬도 안전
      # WCCG_LIVE_CHALLENGE: "on"           # 자동으로 못 푼 인터랙티브 챌린지를 관리자가 대시보드에서 직접 풀기(최후 수단). 데이터센터 IP 면 통과 미보장
    volumes:
      - ./archive:/data/archive
      - ./logs:/data/logs           # 콘솔 로그 파일을 호스트에 노출 (./logs/worker.log)
    shm_size: 1gb                   # 페이지 캡처가 chromium 을 띄운다
    init: true
    restart: unless-stopped

  cli:
    image: ghcr.io/tylorstyle/chunchugwan:latest
    # build: .                      # 로컬 소스에서 직접 빌드하려면 image: 줄 대신 사용
    profiles: ["cli"]               # `docker compose up` 시 기동되지 않음
    environment:
      TZ: "Asia/Seoul"              # schedule add --at 등 시각 계산을 대시보드와 동일 기준으로
      WCCG_LOG_FILE: "/data/logs/cli.log"   # cli 실행 로그 (./logs/cli.log)
    volumes:
      - ./archive:/data/archive
      - ./logs:/data/logs
    shm_size: 1gb
    init: true
