[project]
name = "web-archiver"
version = "0.1.0"
description = "개인 웹 아카이빙 시스템 — 스냅샷 히스토리와 diff 지원"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
    "playwright>=1.44",
    "trafilatura>=1.9",
    "fastapi>=0.111",
    "uvicorn>=0.30",
    "jinja2>=3.1",
    "pillow>=10.3",
]

[project.scripts]
archiver = "archiver.cli:main"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["archiver"]
