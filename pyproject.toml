[project]
name = "chunchugwan"
version = "0.2.0"
description = "개인 웹 아카이빙 시스템 — 스냅샷 히스토리와 diff 지원"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
    "playwright>=1.44",
    "lxml>=5.0",
    "fastapi>=0.111",
    "uvicorn>=0.30",
    "jinja2>=3.1",
    "pillow>=10.3",
    "argon2-cffi>=23.1",
    "pyotp>=2.9",
    "qrcode>=7.4",
    "httpx>=0.28",
    "pyjwt[crypto]>=2.9",
    "python-multipart>=0.0.9",
    "webauthn>=2.7.1",
    "cryptography>=42",
]

[project.scripts]
wccg = "chunchugwan.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["chunchugwan"]
