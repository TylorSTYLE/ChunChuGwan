# develop(테스트) 전용 — **독립 실행 compose 파일**.
#
# docker-compose.yml(운영, :latest)을 오버라이드하지 않는다. 이 파일 하나만으로
# develop 이미지(:develop = develop 브랜치, 푸시마다 게시)를 띄운다.
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml pull        # 새 develop 이미지로 갱신
#   docker compose -f docker-compose.dev.yml down
# 매번 -f 를 넘기기 번거로우면 .env 에 한 줄:
#   COMPOSE_FILE=docker-compose.dev.yml
#
# 운영 compose(docker-compose.yml)와 의도적으로 분리된 별개 파일이다 — 한쪽 서비스
# 정의를 고치면 다른 쪽에도 필요한 만큼 직접 반영한다(자동 병합/상속 없음).
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║ ⚠️  디버그 진단 포트가 켜져 있다 (WCCG_DEBUG=on) — develop/테스트 전용.      ║
# ║                                                                            ║
# ║  serve/worker 가 별도 포트(web/debug_server.py)로 내부 상태(큐·DB·로그·설정)║
# ║  를 노출하고, 1회성 캡처·스케줄 실행 같은 트리거를 받는다. 호스트 포트가     ║
# ║  0.0.0.0(모든 인터페이스)에 매핑돼 **같은 LAN 의 누구나 접근**할 수 있다.    ║
# ║  시크릿 값은 노출되지 않지만(CLAUDE.md 원칙 6) 내부 상태가 보이고 캡처를      ║
# ║  트리거할 수 있으므로:                                                      ║
# ║   • 운영(:latest)·신뢰할 수 없는 네트워크에는 절대 쓰지 말 것.              ║
# ║   • 더 조이려면 아래 WCCG_DEBUG_TOKEN 을 설정해 모든 요청에 X-Debug-Token   ║
# ║     헤더를 요구하게 한다.                                                   ║
# ║   • 디버그가 필요 없으면 두 서비스의 WCCG_DEBUG 줄과 8798/8799 ports 를      ║
# ║     주석 처리하면 포트가 열리지 않는다.                                     ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# 접근 (같은 네트워크의 개발 PC 에서):
#   curl http://<서버-LAN-IP>:8799/debug/health    # worker  (캡처·큐가 도는 프로세스)
#   curl http://<서버-LAN-IP>:8798/debug           # dashboard(API/서빙) — 엔드포인트 목록
#
# 시크릿·개인 설정(관리자 비번·OIDC·SMTP 등)은 이 추적 파일을 고치지 말고 .env
# (KEY=값, gitignore)에 둔다 — 각 서비스가 env_file 로 읽는다. 전체 선택 변수 목록은
# .env.example / docs/AUTHENTICATION.md 참조.
services:
  dashboard:
    image: ghcr.io/tylorstyle/chunchugwan:develop
    command: serve
    depends_on: [worker]            # `up -d dashboard` 만으로 워커가 같이 뜨게
    env_file:
      - path: .env
        required: false
    environment:
      WCCG_HOST: "0.0.0.0"          # 컨테이너 내부 바인딩(8765). 외부 노출은 아래 127.0.0.1 매핑이 차단.
      WCCG_SCHEDULER: "off"         # 단발 아카이빙·스케줄·크롤 실행은 worker 전담
      TZ: "Asia/Seoul"              # 1일 주기 스케줄의 실행 시각(HH:MM) 기준 — 미설정 시 UTC
      WCCG_LOG_FILE: "/data/logs/dashboard.log"
      # ── 디버그 진단 포트 (위 ⚠️ 주의 박스 참조 — develop 전용, LAN 노출) ──
      WCCG_DEBUG: "on"
      WCCG_DEBUG_HOST: "0.0.0.0"    # 0.0.0.0 이어야 호스트 매핑으로 닿는다(127.0.0.1 이면 컨테이너 밖에서 불가)
      # WCCG_DEBUG_TOKEN: "change-me"  # 설정 시 모든 디버그 요청에 X-Debug-Token 헤더 요구(권장)
      # --- 선택 설정은 .env 또는 docker-compose.override.yml 에 (시크릿 커밋 방지) ---
      # WCCG_ADMIN_EMAIL / WCCG_ADMIN_PASSWORD — 최초 구동 시 관리자 자동 등록
      # WCCG_PUBLIC_URL — 리버스 프록시로 외부 노출 시
      # WCCG_OIDC_* / WCCG_SMTP_* — SSO·초대 메일 (전체 목록은 .env.example)
    ports:
      - "127.0.0.1:8765:8765"       # 대시보드는 loopback 유지(원칙 5) — LAN 노출은 리버스 프록시/override 로
      - "8798:8799"                 # ⚠️ 디버그 포트(LAN) — 호스트 8798 → dashboard 컨테이너 8799
    volumes:
      - ./archive:/data/archive     # 소유자가 달라도 기동 시 uid 1000 으로 자동 보정
      - ./logs:/data/logs           # 콘솔 로그 파일을 호스트에 노출 (./logs/dashboard.log)
    init: true                      # 신호 처리/좀비 회수 (dashboard 는 캡처를 안 해 shm_size 불필요)
    restart: unless-stopped

  worker:
    image: ghcr.io/tylorstyle/chunchugwan:develop
    command: worker                 # 단발 아카이빙·스케줄·크롤 큐 소비 — 모든 캡처가 여기서 실행
    env_file:
      - path: .env
        required: false
    environment:
      TZ: "Asia/Seoul"
      WCCG_LOG_FILE: "/data/logs/worker.log"   # 캡처/아카이빙 로그(트레이스백 포함)
      # ── 디버그 진단 포트 (위 ⚠️ 주의 박스 참조 — develop 전용, LAN 노출) ──
      # 캡처·큐 스레드가 이 프로세스에서 도므로 진행 상태/멈춤을 여기서 들여다본다.
      WCCG_DEBUG: "on"
      WCCG_DEBUG_HOST: "0.0.0.0"
      # WCCG_DEBUG_TOKEN: "change-me"
      # WCCG_CRAWL_WORKERS: "2"     # 동시 진행 크롤(사이트) 수 (1~8, 기본 2)
      # --- 스텔스 캡처 (Cloudflare Turnstile 등 봇차단 통과 시도, .env.example 참조) ---
      # WCCG_CAPTURE_ENGINE: "patchright" / WCCG_CAPTURE_HEADFUL: "on" / WCCG_CAPTURE_CHANNEL: "chrome"
      # WCCG_LIVE_CHALLENGE: "on"
    ports:
      - "8799:8799"                 # ⚠️ 디버그 포트(LAN) — 호스트 8799 → worker 컨테이너 8799
    volumes:
      - ./archive:/data/archive
      - ./logs:/data/logs           # ./logs/worker.log
    shm_size: 1gb                   # 페이지 캡처가 chromium 을 띄운다
    init: true
    restart: unless-stopped

  cli:
    image: ghcr.io/tylorstyle/chunchugwan:develop
    profiles: ["cli"]               # `docker compose up` 시 기동되지 않음 (run --rm cli <명령> 으로만)
    env_file:
      - path: .env
        required: false
    environment:
      TZ: "Asia/Seoul"              # schedule add --at 등 시각 계산을 대시보드와 동일 기준으로
      WCCG_LOG_FILE: "/data/logs/cli.log"
    volumes:
      - ./archive:/data/archive
      - ./logs:/data/logs
    shm_size: 1gb
    init: true
